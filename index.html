<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meccha Chameleon Leaderboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>🎉 CONGRATULATIONS YOU FOUND ME! 🎉</h1>


<div class="card">

<img class="main"
src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS3yST1-9W_1_OC-6nRFLzKxzd9f3iLsjl8spbDvl-Jhw&s=10">


<h2>🏆 Meccha Chameleon Leaderboard 🏆</h2>


<div id="board">
Loading leaderboard...
</div>


</div>



<div class="card">


<h2>Add Yourself</h2>


<input 
id="name"
type="text"
placeholder="Enter your name">


<br>


<label for="photo">
📷 Choose Photo
</label>


<input 
id="photo"
type="file"
accept="image/*">


<br>


<button onclick="addPlayer()">
Submit
</button>


</div>





<script>


// =============================
// SUPABASE CONNECTION
// =============================


const SUPABASE_URL =
"https://kchyybbcxxwivgcqwust.supabase.co";


const SUPABASE_KEY =
"sb_publishable_i2iUbLYfyBr_01qlonxnKA_hxXxx2Sf";


const TABLE =
"meccha_chameleon_Leaderboard";


const BUCKET =
"Photos";


const client =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);




// =============================
// LOAD LEADERBOARD
// =============================


async function loadLeaderboard(){


const {data,error}=await client
.from(TABLE)
.select("*")
.order("created_at",
{ascending:false});



if(error){

console.log(error);

document.getElementById("board").innerHTML =
"❌ Error loading leaderboard";

return;

}



let output="";



data.forEach((player,index)=>{


output += `

<div class="entry">

<div class="rank">
#${index+1}
</div>


<img src="${player.photo_url}">


<div class="name">
${player.name}
</div>


</div>

`;

});



document.getElementById("board").innerHTML =
output;


}





// =============================
// ADD PLAYER
// =============================


async function addPlayer(){



const name =
document.getElementById("name")
.value
.trim();



const file =
document.getElementById("photo")
.files[0];



if(!name || !file){

alert(
"Please enter your name and choose a photo"
);

return;

}



// Create unique file name

const fileName =
Date.now()
+"_"+file.name;




// Upload image


const upload =
await client.storage
.from(BUCKET)
.upload(
fileName,
file
);



if(upload.error){

alert(
"Photo upload failed: "
+ upload.error.message
);

return;

}




// Get image URL


const imageURL =
client.storage
.from(BUCKET)
.getPublicUrl(fileName)
.data
.publicUrl;




// Insert into leaderboard


const insert =
await client
.from(TABLE)
.insert({

name:name,

photo_url:imageURL

});



if(insert.error){

console.log(insert.error);

alert(
"Database error: "
+ insert.error.message
);

return;

}



alert(
"🎉 Added to leaderboard!"
);



document.getElementById("name").value="";

document.getElementById("photo").value="";


loadLeaderboard();


}




loadLeaderboard();


</script>


</body>

</html>
